name: Migrar banco

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar aplicação
        run: python -m pip install --requirement requirements.lock

      - name: Aplicar migrações
        env:
          DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "MIGRATION_DATABASE_URL não foi configurada."
            exit 1
          fi
          alembic upgrade head
