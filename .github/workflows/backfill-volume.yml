name: Corrigir volume histórico

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Dias de histórico a reprocessar"
        required: true
        default: "90"
        type: string

permissions:
  contents: read

concurrency:
  group: crypto-risk-collector
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Validar configuração protegida
        shell: bash
        env:
          COLLECTOR_DATABASE_URL: ${{ secrets.COLLECTOR_DATABASE_URL }}
        run: |
          if [ -z "$COLLECTOR_DATABASE_URL" ]; then
            echo "COLLECTOR_DATABASE_URL não foi configurada nos secrets."
            exit 1
          fi

      - name: Instalar aplicação
        run: python -m pip install --requirement requirements.lock

      - name: Reprocessar candles históricos
        env:
          DATABASE_URL: ${{ secrets.COLLECTOR_DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.backfill_quote_volume --days "${{ inputs.days }}"
