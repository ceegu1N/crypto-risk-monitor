name: Coleta agendada

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: read

concurrency:
  group: crypto-risk-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Validar configuração protegida
        shell: bash
        env:
          COLLECTOR_DATABASE_URL: ${{ secrets.COLLECTOR_DATABASE_URL }}
        run: |
          if [ -z "$COLLECTOR_DATABASE_URL" ]; then
            echo "COLLECTOR_DATABASE_URL não foi configurada nos secrets."
            exit 1
          fi

      - name: Instalar aplicação
        run: python -m pip install --requirement requirements.lock

      - name: Coletar candles e avaliar alertas
        env:
          DATABASE_URL: ${{ secrets.COLLECTOR_DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m app.collector --once
