name: Coleta agendada

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: read

concurrency:
  group: crypto-risk-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Validar configuração protegida
        shell: bash
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL não foi configurada nos GitHub Actions secrets."
            exit 1
          fi

      - name: Instalar aplicação
        run: python -m pip install .

      - name: Aplicar migrações
        run: alembic upgrade head

      - name: Coletar candles e avaliar alertas
        run: python -m app.collector --once
