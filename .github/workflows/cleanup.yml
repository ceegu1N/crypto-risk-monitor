name: Limpar carteiras inativas

on:
  workflow_dispatch:
  schedule:
    - cron: "25 4 * * 0"

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar aplicação
        run: python -m pip install --requirement requirements.lock

      - name: Remover carteiras sem atividade por 90 dias
        env:
          DATABASE_URL: ${{ secrets.COLLECTOR_DATABASE_URL }}
        run: python scripts/cleanup_guest_portfolios.py
